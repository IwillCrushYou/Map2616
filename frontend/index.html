<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAP2616 Frontend Emulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app">
        <header class="app-header">
            <h1>MAP2616 Emulator</h1>
            <p>Assemble and execute MAP2616 programs in your browser.</p>
        </header>

        <section class="panel">
            <div class="panel-header">
                <h2>Assembly Program</h2>
                <div class="actions">
                    <button id="loadSampleBtn" type="button">Load Sample</button>
                    <button id="assembleBtn" type="button">Assemble</button>
                    <button id="stepBtn" type="button">Step</button>
                    <button id="runBtn" type="button">Run</button>
                    <button id="resetBtn" type="button">Reset</button>
                    <button id="clearLogBtn" type="button">Clear Log</button>
                </div>
            </div>
            <textarea id="sourceEditor" spellcheck="false"></textarea>
            <p id="statusLine" class="status">Ready.</p>
        </section>

        <section class="grid">
            <article class="panel">
                <h2>CPU State</h2>
                <div class="state-row">
                    <span>PC: <strong id="pcValue">0x0000</strong></span>
                    <span>Cycles: <strong id="cycleValue">0</strong></span>
                    <span>Halted: <strong id="haltValue">no</strong></span>
                    <span>Error: <strong id="errorValue">0</strong></span>
                </div>
                <div class="flags-row">
                    <span id="flagZ" class="flag">Z</span>
                    <span id="flagS" class="flag">S</span>
                    <span id="flagC" class="flag">C</span>
                    <span id="flagV" class="flag">V</span>
                </div>
                <div id="registerGrid" class="register-grid"></div>
            </article>

            <article class="panel">
                <h2>Execution Log</h2>
                <pre id="logOutput" class="log"></pre>
            </article>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
